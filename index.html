<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta charset="utf-8">
  <title>Mejores Juegos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
  <link rel="icon" type="image/png" href="INFOVIS.png">
</head>

<body>
  <header class="encabezado">
    <img src="INFOVIS.png" alt="Icono" class="icono">
    <h1>Mejores Juegos</h1>
  </header>


  <main class="contenido">
    <h2>Comparar Juegos:</h2>

    <div class="contenedor-comparacion">

      <div class="grupo-input autocompletado-contenedor">
        <label for="juego1">Juego 1:</label>
        <input type="text" id="juego1" placeholder="Ej: Elden Ring" autocomplete="off">
        <ul id="listaJuego1" class="lista-sugerencias"></ul>
      </div>

      <div class="grupo-input autocompletado-contenedor">
        <label for="juego2">Juego 2:</label>
        <input type="text" id="juego2" placeholder="Ej: Dead by Daylight" autocomplete="off">
        <ul id="listaJuego2" class="lista-sugerencias"></ul>
      </div>

      <button id="btnComparar">Comparar</button>
    </div>

    <div class="contenedor-grafico">
      <canvas id="graficoRadar"></canvas>
    </div>



  </main>

  <script src="logica.js"></script>
</body>
</html>
